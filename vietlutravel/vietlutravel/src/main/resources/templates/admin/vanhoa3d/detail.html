<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Chi tiết Văn hóa</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --ink: #0f1117;
            --ink-mid: #4a4f63;
            --ink-light: #9399b0;
            --bg: #f0f2f8;
            --surface: #ffffff;
            --accent: #3b5bdb;
            --accent-soft: #eef1fd;
            --accent-glow: rgba(59,91,219,0.15);
            --border: #e2e5f0;
            --danger: #e03131;
            --warning: #f59f00;
            --info: #1c7ed6;
            --success: #2f9e44;
            --shadow: 0 2px 24px rgba(15,17,23,0.07);
            --radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            padding: 2rem;
            position: relative;
        }

        /* Background giống list */
        body::before {
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse 70% 40% at 15% 5%, rgba(59,91,219,0.07), transparent),
                radial-gradient(ellipse 50% 50% at 90% 90%, rgba(100,60,220,0.05), transparent);
        }

        body::after {
            content:'';
            position:fixed;
            inset:0;
            background-image: radial-gradient(circle, rgba(59,91,219,0.1) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: auto;
        }

        /* Topbar giống y chang */
        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:1.7rem;
            flex-wrap:wrap;
        }

        .page-heading {
            display:flex;
            align-items:center;
            gap:0.85rem;
        }

        .heading-icon {
            width:46px;
            height:46px;
            border-radius:12px;
            background:linear-gradient(135deg,#3b5bdb,#4263eb);
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:1.25rem;
            box-shadow:0 4px 14px rgba(59,91,219,0.35);
        }

        .heading-text h1 {
            font-family:'Sora';
            font-size:1.4rem;
            margin:0;
            color:var(--ink);
        }

        .heading-text p {
            font-size:0.8rem;
            color:var(--ink-light);
        }

        /* Button giống */
        .btn {
            font-family:'Sora';
            font-size:0.82rem;
            padding:0.55rem 1.1rem;
            border-radius:8px;
            border:none;
            display:inline-flex;
            align-items:center;
            gap:0.4rem;
            text-decoration:none;
        }

        .btn-ghost {
            background:white;
            border:1.5px solid var(--border);
            color:var(--ink-mid);
        }

        .btn-warning {
            background:#fff9db;
            color:#7c4a00;
            border:1.5px solid #ffe066;
        }

        /* Card */
        .card {
            background:var(--surface);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            border:1px solid var(--border);
            padding:1.5rem;
        }

        /* Section */
        .section {
            margin-bottom:1.3rem;
        }

        .label {
            font-size:0.72rem;
            text-transform:uppercase;
            letter-spacing:0.08em;
            color:var(--ink-light);
            margin-bottom:4px;
        }

        .value {
            font-size:0.9rem;
            color:var(--ink);
        }

        /* Badge giống list */
        .cat-badge {
            padding:0.28rem 0.7rem;
            border-radius:999px;
            font-family:'Sora';
            font-size:0.7rem;
            font-weight:600;
            text-transform:uppercase;
        }

        .cat-lehoi   { background:#ffe3e3; color:#9b1c1c; }
        .cat-dantoc  { background:#e7f5ff; color:#1864ab; }
        .cat-langnghe{ background:#fff9db; color:#7c4a00; }
        .cat-sonnuoc { background:#d3f9d8; color:#1a7a2e; }
        .cat-other   { background:#f3f0ff; color:#5c2d91; }

        /* Image */
        .img-preview {
            max-width:320px;
            border-radius:12px;
            border:1px solid var(--border);
        }

    </style>
</head>
<body>

<div th:replace="fragments/admin-header :: adminHeader"></div>

<div class="page">

    <!-- TOP -->
    <div class="topbar">
        <div class="page-heading">
            <div class="heading-icon">
                <i class="bi bi-buildings-fill"></i>
            </div>
            <div class="heading-text">
                <h1>Văn hóa An Giang 3D</h1>
                <p>Chi tiết nội dung văn hóa</p>
            </div>
        </div>

        <a href="/admin/vanhoa3d" class="btn btn-ghost">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
    </div>

    <!-- CARD -->
    <div class="card">

        <div class="section">
            <div class="label">Tiêu đề</div>
            <div class="value" th:text="${vanHoa.tieuDe}"></div>
        </div>

        <div class="section">
            <div class="label">Danh mục</div>
            <span class="cat-badge"
                  th:classappend="${vanHoa.danhMuc == 'lehoi'} ? 'cat-lehoi' :
                                 (${vanHoa.danhMuc == 'dantoc'} ? 'cat-dantoc' :
                                 (${vanHoa.danhMuc == 'langnghe'} ? 'cat-langnghe' :
                                 (${vanHoa.danhMuc == 'sonnuoc'} ? 'cat-sonnuoc' : 'cat-other'))) "
                  th:text="${vanHoa.danhMuc}">
            </span>
        </div>

        <div class="section">
            <div class="label">Mô tả</div>
            <div class="value" th:text="${vanHoa.moTa}" style="white-space: pre-wrap;"></div>
        </div>

        <div class="section">
            <div class="label">Video</div>
            <div class="value">
                <span th:if="${vanHoa.videoUrl}" class="cat-badge cat-sonnuoc">Có</span>
                <span th:unless="${vanHoa.videoUrl}" class="cat-badge cat-other">Không</span>
            </div>
        </div>

        <div class="section">
            <div class="label">Hình ảnh</div>
            <div>
                <img th:if="${vanHoa.hinhAnh}" th:src="${vanHoa.hinhAnh}" class="img-preview"/>
                <div th:unless="${vanHoa.hinhAnh}" class="value">Chưa có hình ảnh</div>
            </div>
        </div>

        <div class="section">
            <div class="label">Đường dẫn</div>
            <div class="value">
                <div th:if="${vanHoa.videoUrl}">
                    <strong>Video:</strong><br>
                    <span th:text="${vanHoa.videoUrl}"></span>
                </div>
                <div th:if="${vanHoa.hinhAnh}">
                    <strong>Hình ảnh:</strong><br>
                    <span th:text="${vanHoa.hinhAnh}"></span>
                </div>
            </div>
        </div>

        <div style="margin-top:20px;">
            <a th:href="@{/admin/vanhoa3d/edit/{id}(id=${vanHoa.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Sửa
            </a>
        </div>

    </div>

</div>
<div th:replace="fragments/admin-footer :: adminFooter"></div>
</body>
</html>
