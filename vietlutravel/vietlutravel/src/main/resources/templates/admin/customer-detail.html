<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết khách hàng</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <style>
        :root {
            --ink: #0f1117;
            --ink-mid: #4a4f63;
            --ink-light: #9399b0;
            --bg: #f0f2f8;
            --surface: #ffffff;
            --accent: #3b5bdb;
            --accent-soft: #eef1fd;
            --accent-glow: rgba(59,91,219,0.15);
            --border: #e2e5f0;
            --danger: #e03131;
            --warning: #f59f00;
            --shadow: 0 2px 24px rgba(15,17,23,0.07);
            --radius: 16px;
            --radius-sm: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* Dot-grid background matching list page */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 40% at 15% 5%, rgba(59,91,219,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 90% 90%, rgba(100,60,220,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(59,91,219,0.1) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }
        .page-heading {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }
        .heading-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #3b5bdb, #4263eb);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            box-shadow: 0 4px 14px rgba(59,91,219,0.35);
            flex-shrink: 0;
        }
        .heading-text h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.2;
        }
        .heading-text p {
            font-size: 0.8rem;
            color: var(--ink-light);
            margin-top: 0.1rem;
        }

        /* Buttons */
        .btn {
            font-family: 'Sora', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.55rem 1.1rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 3px 10px rgba(59,91,219,0.3);
        }
        .btn-primary:hover { background: #364fc7; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(59,91,219,0.4); }
        .btn-ghost {
            background: var(--surface);
            color: var(--ink-mid);
            border: 1.5px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg); color: var(--ink); border-color: #c5cbdf; }

        /* Card */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header stripe */
        .card-header-stripe {
            padding: 1.5rem 1.75rem;
            background: linear-gradient(135deg, #3b5bdb 0%, #4263eb 50%, #364fc7 100%);
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }
        .card-header-stripe::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -8%;
            width: 220px;
            height: 220px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            pointer-events: none;
        }
        .stripe-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(8px);
        }
        .stripe-text { position: relative; z-index: 1; }
        .stripe-text h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin: 0;
            line-height: 1.2;
        }
        .stripe-text p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            margin-top: 0.15rem;
        }

        /* Avatar + name hero inside card body */
        .user-hero {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 1.75rem;
            border-bottom: 1px solid var(--border);
            background: #fafbfe;
        }
        .avatar-lg {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: white;
            flex-shrink: 0;
        }
        .hero-name {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ink);
        }
        .hero-sub {
            font-size: 0.82rem;
            color: var(--ink-light);
            margin-top: 0.15rem;
        }

        /* Info rows */
        .detail-body { padding: 0.5rem 0; }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.75rem;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }
        .info-row:last-child { border-bottom: none; }

        .info-label {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-family: 'Sora', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--ink-mid);
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }
        .info-label i {
            font-size: 0.95rem;
            color: var(--accent);
            opacity: 0.75;
        }

        .info-value {
            font-size: 0.9rem;
            color: var(--ink);
            font-weight: 500;
            text-align: right;
        }
        .info-value.muted {
            color: var(--ink-light);
            font-weight: 400;
            font-style: italic;
        }

        /* Role badge — same as list page */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.75rem;
            border-radius: 99px;
            font-family: 'Sora', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .role-badge.user  { background: #d3f9d8; color: #1a7a2e; }
        .role-badge.staff { background: #fff3cd; color: #7c4a00; }
        .role-badge.admin { background: #e8d5fb; color: #5c2d91; }

        /* Actions footer */
        .card-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            padding: 1.25rem 1.75rem;
            border-top: 1px solid var(--border);
            background: #fafbfe;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .info-row { flex-direction: column; align-items: flex-start; }
            .info-value { text-align: left; }
        }
    </style>
</head>
<body>

<div th:replace="fragments/admin-header :: adminHeader"></div>

<div class="page">

    <!-- Top bar -->
    <div class="topbar">
        <div class="page-heading">
            <div class="heading-icon"><i class="bi bi-person-vcard-fill"></i></div>
            <div class="heading-text">
                <h1>Chi tiết khách hàng</h1>
                <p>Thông tin tài khoản và cá nhân</p>
            </div>
        </div>
        <div style="display:flex;gap:0.6rem;">
            <a th:href="@{/admin/customers}" class="btn btn-ghost">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
            <a th:href="@{/admin/customers/edit/{id}(id=${customer.customerID})}" class="btn btn-primary">
                <i class="bi bi-pencil-square"></i> Chỉnh sửa
            </a>
        </div>
    </div>

    <!-- Detail card -->
    <div class="card">

        <!-- Header stripe -->
        <div class="card-header-stripe">
            <div class="stripe-icon"><i class="bi bi-person-vcard-fill"></i></div>
            <div class="stripe-text">
                <h2>Chi tiết khách hàng</h2>
                <p>Thông tin tài khoản và cá nhân</p>
            </div>
        </div>

        <!-- Avatar hero -->
        <div class="user-hero">
            <div class="avatar-lg"
                 th:style="'background: hsl(' + (${customer.customerID} * 47 % 360) + ', 55%, 52%);'"
                 style="background: hsl(200,55%,52%)">
                <span th:text="${#strings.toUpperCase(#strings.substring(customer.userName,0,1))}">A</span>
            </div>
            <div>
                <div class="hero-name" th:text="${customer.userName}">Nguyễn Văn A</div>
                <div class="hero-sub" th:text="${customer.email}">user@email.com</div>
            </div>
        </div>

        <!-- Info rows -->
        <div class="detail-body">

            <div class="info-row">
                <span class="info-label"><i class="bi bi-hash"></i> Mã khách hàng</span>
                <span class="info-value" th:text="${customer.customerID}">—</span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-person"></i> Tên đăng nhập</span>
                <span class="info-value" th:text="${customer.userName}">—</span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-envelope"></i> Email</span>
                <span class="info-value" th:text="${customer.email}">—</span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-telephone"></i> Số điện thoại</span>
                <span class="info-value"
                      th:text="${customer.phone != null and !customer.phone.isEmpty()} ? ${customer.phone} : 'Chưa cập nhật'"
                      th:classappend="${customer.phone == null or customer.phone.isEmpty()} ? ' muted' : ''">—</span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-shield-check"></i> Vai trò</span>
                <span>
                    <span class="role-badge"
                          th:classappend="${customer.role == 'ADMIN'} ? 'admin' : (${customer.role == 'STAFF'} ? 'staff' : 'user')">
                        <i class="bi"
                           th:classappend="${customer.role == 'ADMIN'} ? 'bi-shield-fill' : (${customer.role == 'STAFF'} ? 'bi-briefcase-fill' : 'bi-person-fill')"></i>
                        <span th:text="${customer.role}">USER</span>
                    </span>
                </span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-gender-ambiguous"></i> Giới tính</span>
                <span class="info-value"
                      th:text="${customer.gender} ?: 'Chưa cập nhật'"
                      th:classappend="${customer.gender == null} ? ' muted' : ''">—</span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-calendar3"></i> Ngày sinh</span>
                <span class="info-value"
                      th:text="${customer.dateOfBirth != null} ? ${#dates.format(customer.dateOfBirth, 'dd/MM/yyyy')} : 'Chưa cập nhật'"
                      th:classappend="${customer.dateOfBirth == null} ? ' muted' : ''">—</span>
            </div>

            <div class="info-row">
                <span class="info-label"><i class="bi bi-geo-alt"></i> Địa chỉ</span>
                <span class="info-value"
                      th:text="${customer.address} ?: 'Chưa cập nhật'"
                      th:classappend="${customer.address == null} ? ' muted' : ''">—</span>
            </div>

        </div>

        <!-- Actions footer -->
        <div class="card-actions">
            <a th:href="@{/admin/customers}" class="btn btn-ghost">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
            <a th:href="@{/admin/customers/edit/{id}(id=${customer.customerID})}" class="btn btn-primary">
                <i class="bi bi-pencil-square"></i> Chỉnh sửa
            </a>
        </div>

    </div>
</div>

<div th:replace="fragments/admin-footer :: adminFooter"></div>

</body>
</html>
