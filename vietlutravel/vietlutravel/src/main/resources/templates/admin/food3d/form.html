<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Form Ẩm thực 3D</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --ink:#0f1117;
            --ink-mid:#4a4f63;
            --ink-light:#9399b0;
            --bg:#f0f2f8;
            --surface:#ffffff;
            --accent:#3b5bdb;
            --accent-glow:rgba(59,91,219,0.15);
            --border:#e2e5f0;
            --shadow:0 2px 24px rgba(15,17,23,0.07);
            --radius:16px;
        }

        *{box-sizing:border-box;}

        body{
            font-family:'DM Sans',sans-serif;
            background:var(--bg);
            padding:2rem;
            position:relative;
        }

        /* background giống list */
        body::before{
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse 70% 40% at 15% 5%, rgba(59,91,219,0.07), transparent),
                radial-gradient(ellipse 50% 50% at 90% 90%, rgba(100,60,220,0.05), transparent);
        }

        body::after{
            content:'';
            position:fixed;
            inset:0;
            background-image: radial-gradient(circle, rgba(59,91,219,0.1) 1px, transparent 1px);
            background-size:28px 28px;
        }

        .page{
            position:relative;
            z-index:1;
            max-width:900px;
            margin:auto;
        }

        /* TOPBAR */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:1.7rem;
            flex-wrap:wrap;
        }

        .page-heading{
            display:flex;
            align-items:center;
            gap:0.85rem;
        }

        .heading-icon{
            width:46px;
            height:46px;
            border-radius:12px;
            background:linear-gradient(135deg,#3b5bdb,#4263eb);
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:1.2rem;
            box-shadow:0 4px 14px rgba(59,91,219,0.35);
        }

        .heading-text h1{
            font-family:'Sora';
            font-size:1.4rem;
            margin:0;
        }

        .heading-text p{
            font-size:0.8rem;
            color:var(--ink-light);
        }

        /* CARD */
        .card{
            background:var(--surface);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            border:1px solid var(--border);
            padding:1.5rem;
        }

        /* FORM */
        .form-group{
            margin-bottom:1.2rem;
        }

        .form-label{
            font-size:0.72rem;
            text-transform:uppercase;
            letter-spacing:0.08em;
            color:var(--ink-light);
            margin-bottom:4px;
            display:block;
        }

        .form-control{
            width:100%;
            padding:0.55rem 0.75rem;
            border-radius:8px;
            border:1.5px solid var(--border);
            font-size:0.85rem;
            font-family:'DM Sans';
            background:#fafbfe;
            outline:none;
            transition:all 0.2s;
        }

        .form-control:focus{
            border-color:var(--accent);
            background:white;
            box-shadow:0 0 0 3px var(--accent-glow);
        }

        textarea.form-control{
            resize:none;
        }

        /* BUTTON */
        .btn{
            font-family:'Sora';
            font-size:0.82rem;
            padding:0.55rem 1.1rem;
            border-radius:8px;
            border:none;
            display:inline-flex;
            align-items:center;
            gap:0.4rem;
            text-decoration:none;
        }

        .btn-primary{
            background:var(--accent);
            color:white;
        }

        .btn-ghost{
            background:white;
            border:1.5px solid var(--border);
            color:var(--ink-mid);
        }

    </style>
</head>
<body>

<div th:replace="fragments/admin-header :: adminHeader"></div>

<div class="page">

    <!-- TOP -->
    <div class="topbar">
        <div class="page-heading">
            <div class="heading-icon">
                <i class="bi bi-cup-hot-fill"></i>
            </div>
            <div class="heading-text">
                <h1 th:text="${pageTitle}">Thêm Ẩm thực</h1>
                <p>Nhập thông tin món ăn 3D</p>
            </div>
        </div>

        <a href="/admin/food3d" class="btn btn-ghost">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
    </div>

    <!-- FORM -->
    <div class="card">
        <form th:action="@{/admin/food3d/save}" method="POST">

            <input type="hidden" name="id" th:value="${food.id}">

            <div class="form-group">
                <label class="form-label">Tên *</label>
                <input type="text" name="name" class="form-control"
                       th:value="${food.name}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Mô tả</label>
                <textarea name="description" class="form-control" rows="4"
                          th:text="${food.description}"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Giá</label>
                <input type="text" name="price" class="form-control"
                       th:value="${food.price}">
            </div>

            <div class="form-group">
                <label class="form-label">Nguyên liệu</label>
                <textarea name="ingredients" class="form-control" rows="3"
                          th:text="${food.ingredients}"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Câu chuyện</label>
                <textarea name="story" class="form-control" rows="3"
                          th:text="${food.story}"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Model 3D</label>
                <input type="text" name="modelPath" class="form-control"
                       th:value="${food.modelPath}">
            </div>

            <div class="form-group">
                <label class="form-label">Poster</label>
                <input type="text" name="posterPath" class="form-control"
                       th:value="${food.posterPath}">
            </div>

            <div class="form-group">
                <label class="form-label">Alt Text</label>
                <input type="text" name="altText" class="form-control"
                       th:value="${food.altText}">
            </div>

            <div class="form-group">
                <label class="form-label">Rating</label>
                <input type="number" name="rating" class="form-control"
                       th:value="${food.rating}" min="0" max="5" step="0.1">
            </div>

            <div class="form-group">
                <label class="form-label">Số đánh giá</label>
                <input type="number" name="reviewsCount" class="form-control"
                       th:value="${food.reviewsCount}" min="0">
            </div>

            <div style="margin-top:20px;">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Lưu
                </button>
                <a href="/admin/food3d" class="btn btn-ghost">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
            </div>

        </form>
    </div>

</div>
<div th:replace="fragments/admin-footer :: adminFooter"></div>
</body>
</html>
