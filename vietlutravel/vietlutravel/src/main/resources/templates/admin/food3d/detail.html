<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Chi tiết Ẩm thực</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --ink: #0f1117;
            --ink-mid: #4a4f63;
            --ink-light: #9399b0;
            --bg: #f0f2f8;
            --surface: #ffffff;
            --accent: #3b5bdb;
            --accent-soft: #eef1fd;
            --accent-glow: rgba(59,91,219,0.15);
            --border: #e2e5f0;
            --warning: #f59f00;
            --success: #2f9e44;
            --shadow: 0 2px 24px rgba(15,17,23,0.07);
            --radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            padding: 2rem;
            position: relative;
        }

        /* background giống y chang */
        body::before {
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse 70% 40% at 15% 5%, rgba(59,91,219,0.07), transparent),
                radial-gradient(ellipse 50% 50% at 90% 90%, rgba(100,60,220,0.05), transparent);
        }

        body::after {
            content:'';
            position:fixed;
            inset:0;
            background-image: radial-gradient(circle, rgba(59,91,219,0.1) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: auto;
        }

        /* TOPBAR giống hệt */
        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:1.7rem;
            flex-wrap:wrap;
        }

        .page-heading {
            display:flex;
            align-items:center;
            gap:10px;
        }

        .heading-icon {
            width:46px;
            height:46px;
            border-radius:12px;
            background:linear-gradient(135deg,#3b5bdb,#4263eb);
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            box-shadow:0 4px 14px rgba(59,91,219,0.35);
        }

        .heading-text h1 {
            font-family:'Sora';
            font-size:1.4rem;
            margin:0;
        }

        .heading-text p {
            font-size:0.8rem;
            color:var(--ink-light);
        }

        /* BUTTON giống */
        .btn {
            font-family:'Sora';
            font-size:0.82rem;
            padding:0.55rem 1.1rem;
            border-radius:8px;
            border:none;
            display:inline-flex;
            align-items:center;
            gap:5px;
            text-decoration:none;
        }

        .btn-ghost {
            background:white;
            border:1.5px solid var(--border);
            color:var(--ink-mid);
        }

        .btn-warning {
            background:#fff9db;
            color:#7c4a00;
            border:1.5px solid #ffe066;
        }

        /* CARD giống */
        .card {
            background:var(--surface);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            border:1px solid var(--border);
            padding:1.5rem;
        }

        /* SECTION */
        .section {
            margin-bottom:1.3rem;
        }

        .label {
            font-size:0.75rem;
            text-transform:uppercase;
            letter-spacing:0.06em;
            color:var(--ink-light);
            margin-bottom:4px;
        }

        .value {
            font-size:0.9rem;
            color:var(--ink);
        }

        /* BADGE giống */
        .badge {
            padding:0.3rem 0.7rem;
            border-radius:999px;
            font-size:0.7rem;
            font-weight:600;
        }

        .badge-success { background:#d3f9d8; color:#1a7a2e; }
        .badge-secondary { background:#f1f3f5; color:#6c757d; }

    </style>
</head>
<body>

<div th:replace="fragments/admin-header :: adminHeader"></div>

<div class="page">

    <!-- TOP -->
    <div class="topbar">
        <div class="page-heading">
            <div class="heading-icon">
                <i class="bi bi-cup-hot-fill"></i>
            </div>
            <div class="heading-text">
                <h1>Ẩm thực 3D</h1>
                <p>Chi tiết món ăn</p>
            </div>
        </div>

        <a href="/admin/food3d" class="btn btn-ghost">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
    </div>

    <!-- CARD -->
    <div class="card">

        <div class="section">
            <div class="label">Tên</div>
            <div class="value" th:text="${food.name}"></div>
        </div>

        <div class="section">
            <div class="label">Mô tả</div>
            <div class="value" th:text="${food.description}"></div>
        </div>

        <div class="section">
            <div class="label">Giá</div>
            <div class="value" th:text="${food.price}"></div>
        </div>

        <div class="section">
            <div class="label">Nguyên liệu</div>
            <div class="value" th:text="${food.ingredients}"></div>
        </div>

        <div class="section">
            <div class="label">Câu chuyện</div>
            <div class="value" th:text="${food.story}"></div>
        </div>

        <div class="section">
            <div class="label">Đánh giá</div>
            <div class="value">
                <span th:if="${food.rating}" class="badge badge-success">
                    ⭐ <span th:text="${food.rating}"></span>
                </span>
                <span th:unless="${food.rating}" class="badge badge-secondary">
                    Chưa có
                </span>
            </div>
        </div>

        <div class="section">
            <div class="label">Số đánh giá</div>
            <div class="value" th:text="${food.reviewsCount}"></div>
        </div>

        <div class="section">
            <div class="label">Model 3D</div>
            <div class="value" th:text="${food.modelPath}"></div>
        </div>

        <div class="section">
            <div class="label">Poster</div>
            <div class="value" th:text="${food.posterPath}"></div>
        </div>

        <div style="margin-top:20px;">
            <a th:href="@{/admin/food3d/edit/{id}(id=${food.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Sửa
            </a>
        </div>

    </div>

</div>
<div th:replace="fragments/admin-footer :: adminFooter"></div>
</body>
</html>
