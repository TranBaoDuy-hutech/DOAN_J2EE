<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Thanh Toán VNPAY - VietluTravel</title>
    <!-- Tailwind CSS (assuming it's used or standard styles) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center">

        <div th:if="${success}">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Thanh Toán Thành Công!</h2>
        </div>

        <div th:if="${!success}">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Giao Dịch Thất Bại</h2>
        </div>

        <p class="text-gray-600 mb-6" th:text="${message}"></p>

        <div class="space-y-3">
            <a href="/"
                class="block w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded transition duration-200">
                Về Trang Chủ
            </a>
            <a href="/booking-history"
                class="block w-full py-2 px-4 border border-blue-600 text-blue-600 hover:bg-blue-50 rounded transition duration-200">
                Lịch Sử Đặt Tour
            </a>
        </div>
    </div>

</body>

</html>
